# Apple Silicon M5 Pro 优化配置
# 针对 macOS ARM64 架构的性能优化配置

# 相机配置
camera:
  id: 0
  resolution: [1920, 1080]
  fps: 30                    # M5 Pro 可支持更高帧率
  backend: AVFOUNDATION      # macOS 原生后端，性能更好
  auto_focus: true
  exposure: -1

# 标定配置
calibration:
  checkerboard: [9, 6]
  square_size: 25.0
  min_images: 15
  file_path: calibration_data/calib_params.json

# 检测配置 - Apple Silicon 优化
detection:
  # YOLOv8 模型配置
  pose_model: models/yolov8n-pose.pt
  detect_model: models/yolov8n.pt
  hand_model: mediapipe
  
  # MPS 加速配置
  device: mps                # mps/cpu/auto
  half_precision: true       # FP16 加速
  conf_threshold: 0.5
  iou_threshold: 0.45
  smooth_enabled: true
  
  # 性能优化
  max_persons: 10
  max_hands: 4
  imgsz: 640                 # 推理尺寸，平衡速度和精度
  batch_size: 1              # MPS 单批处理更稳定
  
  # 多核优化（M5 Pro 多核性能强）
  workers: 4                 # 数据加载线程数
  nms_kernel: cpu            # NMS 在 CPU 上更快

# 空间计量配置
spatial:
  ref_shoulder_width: 0.45
  ref_hand_length: 0.18
  camera_height: 1.8
  pitch_angle: 30.0
  topview_scale: 10.0
  enable_correction: true
  enable_fusion: true

# 视频流配置 - macOS 优化
stream:
  type: mjpeg
  quality: 90                # M5 Pro 可处理更高质量
  bitrate: 3000000           # 3Mbps
  gop_size: 30
  encoder: videotoolbox      # macOS 硬件编码

# 服务器配置
server:
  host: 0.0.0.0
  port: 8000
  reload: false
  workers: 1                 # macOS 单进程更稳定

# 日志配置
log:
  level: INFO
  file: logs/app.log
  rotation: 10 MB
  retention: 7 days

# Apple Silicon 特定优化
apple_silicon:
  # MPS 优化
  mps_memory_limit: 0.8      # 使用 80% 统一内存
  mps_fallback: true         # MPS 失败时回退到 CPU
  
  # 神经引擎优化（如果支持）
  neural_engine: false       # 实验性功能
  
  # 视频解码优化
  videotoolbox: true         # 硬件视频解码
  
  # 线程优化
  intra_op_num_threads: 4    # OpenCV 内部线程
  inter_op_num_threads: 2    # OpenCV 操作间线程
